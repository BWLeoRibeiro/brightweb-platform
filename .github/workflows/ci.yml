name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `changeset status` can diff against `main`.
          fetch-depth: 0

      # On PRs the checkout is detached with no local `main`; `changeset status`
      # runs `git merge-base main HEAD`, so materialise a local `main` ref from
      # the remote-tracking branch. No-op on push-to-main builds.
      - name: Ensure base ref for changeset diff
        run: git rev-parse --verify --quiet main || git branch main origin/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release state
        run: pnpm release:check

      - name: Check module manifests
        run: pnpm check:module-manifest

      - name: Check compatibility set
        run: pnpm check:compatibility-set

      - name: Check scaffold template contracts
        run: pnpm check:create-bw-app-templates

      - name: Build starter app
        run: pnpm build
